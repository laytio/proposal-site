version: '3.9'

services:
  proposal-site:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: proposal-site
    ports:
      - "3000:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
